<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f5;
    color: #383838;
    min-height: 100vh;
    padding: 48px 24px;
    -webkit-font-smoothing: antialiased;
  }

  .page { max-width: 1120px; margin: 0 auto; }

  .page-header { margin-bottom: 40px; }
  .page-header h1 {
    font-size: 24px; font-weight: 600;
    letter-spacing: -0.3px; margin-bottom: 6px;
  }
  .page-header p {
    font-size: 14px; color: #737373; line-height: 1.5;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 960px) {
    .card-grid { grid-template-columns: 1fr; max-width: 480px; }
  }

  .card {
    display: block;
    border-radius: 12px;
    overflow: hidden;
    text-decoration: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.10);
  }
  .card img {
    width: 100%;
    display: block;
  }
</style>
</head>
<body>

<div class="page">
  <div class="page-header">
    <h1>Design Explorations</h1>
    <p>Prototypes and design explorations for Template Customization.</p>
  </div>

  <div class="card-grid">
    <a class="card" href="template-customization/index.html">
      <img src="assets/Frame 1430106135.png" alt="Settings Page" />
    </a>
    <a class="card" href="template-customization/contextual.html">
      <img src="assets/Frame 1430106136.png" alt="Contextual" />
    </a>
    <a class="card" href="template-customization/onboarding-v2.html">
      <img src="assets/Frame 1421176816.png" alt="Onboarding" />
    </a>
  </div>
</div>

</body>
</html>
